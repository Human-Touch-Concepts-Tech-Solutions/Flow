name: Backend CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check app imports
        run: |
          cd backend
          # Export PYTHONPATH so Python sees the 'app' folder
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -c "from app.main import app; print('✅ Imports successful')"